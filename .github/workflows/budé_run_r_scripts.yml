name: Budé - Run R Scripts and Save Outputs

on:
  workflow_run:
    workflows: ["Budé - Setup MySQL, Import Data, Create DB Dump, and Run Queries"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: bude-r-scripts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-r-scripts:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ckudella/corr_data-r-env:r4.5.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
   
    - name: Replace folder specification for setwd() in R Scripts
      run: |
        find budé/r_scripts/ -type f -name "*.R" -exec sed -i 's|setwd("../query_results/")|setwd("budé/query_results/")|g' {} +
        find budé/r_scripts/ -type f -name "*.R" -exec sed -i 's|setwd("../r_plots/")|setwd("/__w/corr_data/corr_data/budé/r_plots/")|g' {} +
    
    - name: Run R Scripts
      run: |
        find budé/r_scripts/ -type f -name "*.R" | while read script; do
          echo "📥 Running script: $script"
          Rscript "$script"
        done
      
#   - name: Upload R Plots
#     uses: actions/upload-artifact@v4
#     with:
#       name: r-plots
#       path: budé/r_plots/
#
#   - name: Upload Leaflet Maps
#     uses: actions/upload-artifact@v4
#     with:
#       name: leaflet-maps
#       path: budé/leaflet_maps/

    - name: Configure Git
      run: |
        git config --global user.name "CKudella"
        git config --global user.email "CKudella@users.noreply.github.com"
        git config --global --add safe.directory /__w/corr_data/corr_data
        git checkout -- budé/r_scripts/
 
    - name: Commit and push changes
      run: |
        git pull --rebase https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ckudella/corr_data.git master
        git add -A
        git commit -m "Auto-update r_plots" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ckudella/corr_data.git HEAD:master
