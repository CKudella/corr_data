name: Build and Push R Environment Image

on:
  push:
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag and lowercase owner
        id: version
        run: |
          # Reads the rocker base image version from the FROM line and uses it
          # as part of the image tag, e.g. rocker/geospatial:4.5.1 -> r4.5.1
          BASE=$(grep -m1 '^FROM' Dockerfile | awk -F: '{print $2}')
          echo "tag=r${BASE}" >> "$GITHUB_OUTPUT"
          # ghcr.io requires fully lowercase repository names
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.owner }}/corr_data-r-env:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.version.outputs.owner }}/corr_data-r-env:latest
