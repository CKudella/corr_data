name: Erasmus Budé Intersections - Setup MySQL, Import Data, and Run Queries

on:
  workflow_run:
    workflows:
      - "Erasmus - Setup MySQL, Import Data, Create DB Dump, and Run Queries"
      - "Budé - Setup MySQL, Import Data, Create DB Dump, and Run Queries"
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: era-bude-queries-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # AND-Gate: only proceed when BOTH base workflows have completed successfully.
  # When triggered by workflow_run, one of the two workflows just finished.
  # This job queries the GitHub API to confirm the *other* one also succeeded
  # recently. On workflow_dispatch both checks are skipped (always passes).
  # ─────────────────────────────────────────────────────────────────────────────
  check-prerequisites:
    runs-on: ubuntu-latest
    outputs:
      both-ready: ${{ steps.gate.outputs.both-ready }}

    steps:
      - name: Check that both base workflows completed successfully
        id: gate
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # On manual dispatch we always proceed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "both-ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ERA_NAME="Erasmus - Setup MySQL, Import Data, Create DB Dump, and Run Queries"
          BUDE_NAME="Budé - Setup MySQL, Import Data, Create DB Dump, and Run Queries"

          check_workflow() {
            local workflow_name="$1"
            # Fetch the most recent run of the given workflow on master
            local result
            result=$(gh api \
              "repos/${REPO}/actions/runs?branch=master&status=success&per_page=5" \
              --jq ".workflow_runs[] | select(.name == \"${workflow_name}\") | .conclusion" \
              | head -1)
            echo "$result"
          }

          ERA_STATUS=$(check_workflow "$ERA_NAME")
          BUDE_STATUS=$(check_workflow "$BUDE_NAME")

          echo "Erasmus last conclusion: ${ERA_STATUS}"
          echo "Budé last conclusion   : ${BUDE_STATUS}"

          if [ "$ERA_STATUS" = "success" ] && [ "$BUDE_STATUS" = "success" ]; then
            echo "both-ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "both-ready=false" >> "$GITHUB_OUTPUT"
            echo "⏳ Waiting for both base workflows – skipping intersection run."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Main job: runs only when the AND-gate above gives the green light.
  # ─────────────────────────────────────────────────────────────────────────────
  setup-mysql:
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.both-ready == 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=localhost --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas mysql-connector-python

      - name: Create Both Databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS era_cdb;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS bude_cdb;"

      - name: Check Foreign Keys for Erasmus dataset
        run: |
          python erasmus/check_for_missing_db_keys.py erasmus

      - name: Run Python Script to Setup Database and Import Data for Erasmus
        run: python erasmus/database/create_script/import_data.py

      - name: Check Foreign Keys für Budé dataset
        run: |
          python budé/check_for_missing_db_keys.py budé

      - name: Run Python Script to Setup Database and Import Data for Budé
        run: python budé/database/create_script/import_data.py

      - name: Run SQL Queries and Save Results
        run: python intersections_budé_erasmus/run_queries.py

#     - name: Upload Query Results as Artifact
#       uses: actions/upload-artifact@v4
#       with:
#         name: query-results
#         path: intersections_budé_erasmus/query_results/

      - name: Configure Git
        run: |
          git config --global user.name "CKudella"
          git config --global user.email "CKudella@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git pull --rebase https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ckudella/corr_data.git master
          git add -A
          git commit -m "Auto-update db dump and query_results" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/ckudella/corr_data.git HEAD:master
